<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}DevPulse{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="{{ url_for('home') }}" class="logo">📊 DevPulse</a>
        <div class="nav-right">
            <span class="nav-tag">Commit Risk Predictor</span>
            <button id="theme-toggle" class="theme-btn" title="Toggle dark mode">🌙</button>
        </div>
    </div>
</nav>

<main class="container">
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    <p>DevPulse &middot; Developer Productivity &amp; Code Quality Dashboard &middot; Day 14 Internship Task</p>
</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
