<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}DevPulse{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="{{ url_for('home') }}" class="logo"><span class="dot">●</span>devpulse</a>

        <div class="pulse-wrap">
            <svg viewBox="0 0 300 34" preserveAspectRatio="none">
                <polyline class="pulse-line"
                    style="--pulse-color: {{ pulse_color or 'var(--risk-low)' }};"
                    points="0,17 20,17 28,17 34,4 40,30 46,17 60,17 90,17 98,17 104,4 110,30 116,17 130,17
                            150,17 170,17 178,17 184,4 190,30 196,17 210,17 240,17 248,17 254,4 260,30 266,17 280,17 300,17" />
            </svg>
        </div>

        <div class="nav-links">
            <a href="{{ url_for('home') }}" class="{{ 'active' if active == 'home' else '' }}">predict</a>
            <a href="{{ url_for('history') }}" class="{{ 'active' if active == 'history' else '' }}">history</a>
        </div>
    </div>
</nav>

<main class="container {{ container_class or '' }}">
    {% block content %}{% endblock %}
</main>

<footer class="footer">devpulse · developer productivity &amp; code quality dashboard · day 15</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
