{% extends "base.html" %}
{% block title %}DevPulse — Sign Up{% endblock %}
{% block content %}

<div class="auth-wrap">
    <div class="hero" style="text-align:center; margin-bottom:1.75rem;">
        <div class="eyebrow">create an account</div>
        <h1>Join DevPulse</h1>
        <p class="subtitle" style="margin:0 auto;">Create an account to start monitoring commit risk.</p>
    </div>

    <form action="{{ url_for('signup') }}" method="POST" class="auth-card" novalidate>
        <div class="field">
            <label for="username">username</label>
            <input type="text" id="username" name="username" placeholder="e.g. dev_jane"
                   value="{{ username or '' }}" minlength="3" required autofocus>
        </div>
        <div class="field">
            <label for="email">email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com"
                   value="{{ email or '' }}" required>
        </div>
        <div class="field">
            <label for="password">password</label>
            <input type="password" id="password" name="password" placeholder="min. 6 characters"
                   minlength="6" required>
        </div>
        <div class="field">
            <label for="confirm_password">confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="repeat password"
                   minlength="6" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">▸ create account</button>

        <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </form>
</div>
{% endblock %}
