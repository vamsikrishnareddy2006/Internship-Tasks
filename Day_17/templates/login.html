{% extends "base.html" %}
{% block title %}DevPulse — Log In{% endblock %}
{% block content %}

<div class="auth-wrap">
    <div class="hero" style="text-align:center; margin-bottom:1.75rem;">
        <div class="eyebrow">welcome back</div>
        <h1>Log in to DevPulse</h1>
        <p class="subtitle" style="margin:0 auto;">Sign in to run predictions and view your history.</p>
    </div>

    <form action="{{ url_for('login') }}" method="POST" class="auth-card" novalidate>
        <div class="field">
            <label for="username">username</label>
            <input type="text" id="username" name="username" placeholder="e.g. dev_jane"
                   value="{{ username or '' }}" required autofocus>
        </div>
        <div class="field">
            <label for="password">password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">▸ log in</button>

        <p class="auth-switch">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
    </form>
</div>
{% endblock %}
